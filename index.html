<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1, minimum-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Großer Preis – Willkommen</title>
  <meta name="description" content="Willkommen beim ultimativen „Der große Preis“-Tool! Klicke auf das Logo, um das Quiz zu starten." />
  <link rel="icon" type="image/png" href="GrosserPreis.png" />
  <link rel="apple-touch-icon" href="GrosserPreis.png" />
  <link rel="stylesheet" href="css/style.css?v=1.6" />
  <style>
    body {
      background: #000000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 40px 20px 24px;
    }

    .landing-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .game-logo-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .game-logo {
      max-width: 520px;
      width: 90vw;
      height: auto;
      aspect-ratio: 1;
      object-fit: contain;
    }

    .landing-subtitle {
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 600;
      color: var(--text-dim);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      margin-top: 12px;
      margin-bottom: 24px;
      line-height: 1.4;
      max-width: 520px;
    }

    /* Der strahlende weiße Startknopf */
    .btn-start-landing {
      font-size: 22px;
      font-weight: 900;
      padding: 16px 54px;
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      background: #ffffff;
      color: #000000;
      border: none;
      display: inline-block;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 
        0 0 20px rgba(255, 255, 255, 0.5),
        0 0 40px rgba(255, 255, 255, 0.25),
        0 0 60px rgba(0, 162, 255, 0.15),
        0 0 60px rgba(255, 0, 128, 0.15);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    /* Schein-Effekt über den Button streichend */
    .btn-start-landing::before {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.6),
        transparent
      );
      transform: skewX(-25deg);
      transition: none;
    }

    .btn-start-landing:hover {
      transform: translateY(-4px) scale(1.05);
      letter-spacing: 0.14em;
      box-shadow: 
        0 0 35px rgba(255, 255, 255, 0.9),
        0 0 55px rgba(255, 255, 255, 0.5),
        0 0 80px rgba(0, 162, 255, 0.35),
        0 0 80px rgba(255, 0, 128, 0.35);
    }

    .btn-start-landing:hover::before {
      left: 150%;
      transition: all 0.8s ease-in-out;
    }

    .btn-start-landing:active {
      transform: translateY(-1px) scale(0.98);
      box-shadow: 
        0 0 15px rgba(255, 255, 255, 0.9),
        0 0 25px rgba(255, 255, 255, 0.6),
        0 0 45px rgba(0, 162, 255, 0.4),
        0 0 45px rgba(255, 0, 128, 0.4);
      transition: all 0.1s ease;
    }

    .btn-secondary-landing {
      display: inline-block;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: all 0.3s ease;
    }

    .btn-secondary-landing:hover {
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      width: 100%;
      max-width: 500px;
    }

    .footer-dedication {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .footer-production {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.2);
    }

    @keyframes float-logo {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

  <div class="landing-container">
    <div class="game-logo-wrap">
      <img src="grosser_preis_front.jpg" alt="Großer Preis Logo" class="game-logo" />
    </div>

    <div class="landing-subtitle">
      Willkommen beim ultimativen „Der große Preis“-Tool!
    </div>

    <div id="landingActions">
      <!-- Der Startknopf wird dynamisch per JavaScript eingefügt -->
    </div>
  </div>

  <div class="footer">
    <div class="footer-dedication">Soli Deo Gloria — Alle Ehre unserem Herrn</div>
    <div class="footer-production">© 2026 Ayen Production • Alle Rechte vorbehalten</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const hasGameState = !!localStorage.getItem('gp_gameState');
      const actionsContainer = document.getElementById('landingActions');

      if (hasGameState) {
        actionsContainer.innerHTML = `
          <a href="game.html" class="btn-start-landing">Spiel fortsetzen</a>
          <br>
          <a href="config.html" class="btn-secondary-landing">Neues Spiel / Konfiguration</a>
        `;
      } else {
        actionsContainer.innerHTML = `
          <a href="config.html" class="btn-start-landing">Start</a>
        `;
      }
    });
  </script>

</body>
</html>
